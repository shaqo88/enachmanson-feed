name: Update Podcast Feed

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger button

concurrency:
  group: update-feed
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.x'

      - name: Check if feed changed
        id: check
        run: python3 check_feed.py

  update:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.x'

      - name: Run converter
        run: python3 convert_feed.py

      - name: Commit updated feed and hash
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add feed.xml last_hash.txt
          git commit -F commit_msg.txt
          git push

      - name: Send email notification
        uses: dawidd6/action-send-mail@2cea9617b09d83a84e56f65e2e40b0c09b48067f  # v3.12.0
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "📻 Podcast Feed Updated"
          to: ${{ secrets.GMAIL_USER }}
          from: ${{ secrets.GMAIL_USER }}
          body: ${{ github.workspace }}/commit_msg.txt
          content_type: text/plain
